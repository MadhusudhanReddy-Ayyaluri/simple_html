<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Webpage</title>

    <style>
        body {
            background-color: #e6f7ff; /* Light Blue */
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            color: #003366; /* Dark Blue */
        }

        p {
            color: #444;
            font-size: 20px;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Website</h1>

    <p>This webpage has a colorful background and styled button.</p>

    <button onclick="alert('Hello! Welcome to HTML.')">
        Click Me
    </button>

</body>
</html>
